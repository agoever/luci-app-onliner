<%+header%>

<script type="text/javascript" src="<%=url('luci-static/resources/cbi.js')%>"></script>
<script type="text/javascript">
// 简单MAC厂商库，你可以自己继续加
var mac_vendors = {
    "00:1A:11": "Apple",
    "00:1B:63": "Dell",
    "00:1C:42": "Hewlett-Packard",
    "00:22:69": "ASUS",
    "00:23:AB": "Sony",
    "18:65:90": "Xiaomi",
    "28:6C:07": "TP-Link",
    "30:5A:3A": "Huawei",
    "44:03:34": "Intel",
    "48:46:FB": "Apple",
    "58:44:98": "Apple",
    "6C:E8:BD": "Xiaomi",
    "70:3A:CB": "Apple",
    "74:23:44": "Samsung",
    "84:7C:9B": "Realtek",
    "8C:BE:BE": "Xiaomi",
    "9C:A7:AE": "TP-Link",
    "AC:84:C6": "Xiaomi",
    "B8:27:EB": "Raspberry Pi",
    "F8:34:41": "Apple"
};

function get_vendor(mac) {
    if (!mac || mac.length < 17) return "Unknown";
    var prefix = mac.substr(0, 8).toUpperCase();
    return mac_vendors[prefix] || "Unknown";
}

XHR.poll(5, '<%=url('admin/services/onliner/get_onliner')%>', null,
    function (type, json) {
        var list = document.getElementById('online_list');
        if (!list) return;
        list.innerHTML = '';

        if (!json || !json.devices) {
            list.innerHTML = '<tr><td colspan="6"><em>No online devices</em></td></tr>';
            return;
        }

        json.devices.forEach(function(dev) {
            var tr = document.createElement('tr');
            tr.className = 'cbi-section-table-row';

            // 设备名称
            var td_name = document.createElement('td');
            td_name.style.width = '18%';
            td_name.textContent = dev.name || dev.mac || '?';
            tr.appendChild(td_name);

            // MAC + 厂商
            var td_mac = document.createElement('td');
            td_mac.style.width = '24%';
            td_mac.style.fontFamily = 'monospace';
            td_mac.textContent = dev.mac || '—';
            tr.appendChild(td_mac);

            // 厂商
            var td_vendor = document.createElement('td');
            td_vendor.style.width = '14%';
            td_vendor.textContent = get_vendor(dev.mac);
            tr.appendChild(td_vendor);

            // IPv4
            var td_ipv4 = document.createElement('td');
            td_ipv4.style.width = '16%';
            td_ipv4.textContent = dev.ipv4 || '—';
            tr.appendChild(td_ipv4);

            // IPv6 标识
            var td_ipv6 = document.createElement('td');
            td_ipv6.style.width = '8%';
            td_ipv6.style.textAlign = 'center';
            if (dev.ipv6 && dev.ipv6.length > 0) {
                td_ipv6.innerHTML = '<span style="color:#009a50; font-weight:bold">IPv6</span>';
            } else {
                td_ipv6.textContent = '—';
            }
            tr.appendChild(td_ipv6);

            // 信号强度
            var td_signal = document.createElement('td');
            td_signal.style.width = '10%';
            td_signal.style.textAlign = 'center';
            var signal = dev.signal || dev.rssi;
            if (signal) {
                td_signal.textContent = signal + " dBm";
            } else {
                td_signal.textContent = '—';
            }
            tr.appendChild(td_signal);

            // 在线时长
            var td_uptime = document.createElement('td');
            td_uptime.style.width = '10%';
            td_uptime.style.textAlign = 'right';
            td_uptime.textContent = dev.uptime || '—';
            tr.appendChild(td_uptime);

            list.appendChild(tr);
        });
    }
);
</script>

<div class="cbi-map">
    <h2>在线设备</h2>
    <div class="cbi-section">
        <div class="cbi-section-descr">当前局域网所有在线设备</div>
        <div class="cbi-section-table">
            <div class="cbi-section-table-titles">
                <div class="cbi-section-table-cell" style="width:18%">设备名称</div>
                <div class="cbi-section-table-cell" style="width:24%">MAC 地址</div>
                <div class="cbi-section-table-cell" style="width:14%">厂商</div>
                <div class="cbi-section-table-cell" style="width:16%">IPv4</div>
                <div class="cbi-section-table-cell" style="width:8%; text-align:center">IPv6</div>
                <div class="cbi-section-table-cell" style="width:10%; text-align:center">信号</div>
                <div class="cbi-section-table-cell" style="width:10%; text-align:right">时长</div>
            </div>
            <div id="online_list" class="cbi-section-table-row cbi-rowstyle-1"></div>
        </div>
    </div>
</div>

<%+footer%>
